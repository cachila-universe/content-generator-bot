<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="20" y="20" width="760" height="760" rx="120" ry="120" fill="url(#bg)"/>

  <!-- Subtle glass shine overlay (top half) -->
  <rect x="20" y="20" width="760" height="380" rx="120" ry="120" fill="url(#glow)"/>

  <!-- Decorative circuit lines — tech personality -->
  <line x1="580" y1="100" x2="680" y2="100" stroke="rgba(255,255,255,0.08)" stroke-width="3" stroke-linecap="round"/>
  <line x1="680" y1="100" x2="680" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="680" cy="160" r="5" fill="rgba(255,255,255,0.10)"/>
  <line x1="120" y1="700" x2="120" y2="640" stroke="rgba(255,255,255,0.08)" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="640" x2="200" y2="640" stroke="rgba(255,255,255,0.08)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="200" cy="640" r="5" fill="rgba(255,255,255,0.10)"/>

  <!-- "TL" bold monogram -->
  <text x="400" y="360" font-family="Inter, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="260" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-12" dominant-baseline="central">TL</text>

  <!-- Accent underline bar -->
  <rect x="200" y="430" width="400" height="6" rx="3" fill="url(#accent)" opacity="0.7"/>

  <!-- "INSIGHTS" text below -->
  <text x="400" y="520" font-family="Inter, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="80" font-weight="700" fill="white" text-anchor="middle" letter-spacing="18" opacity="0.95">INSIGHTS</text>

  <!-- Accent dot cluster (top-right) — tech feel -->
  <circle cx="620" cy="180" r="12" fill="#60a5fa" opacity="0.8"/>
  <circle cx="620" cy="180" r="5" fill="white" opacity="0.6"/>
  <circle cx="655" cy="210" r="6" fill="#60a5fa" opacity="0.4"/>
  <circle cx="590" cy="215" r="4" fill="#93c5fd" opacity="0.3"/>

  <!-- Tagline at bottom -->
  <text x="400" y="630" font-family="Inter, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="36" font-weight="500" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="6">TECHLIFE</text>
</svg>
