<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="iconAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Icon mark (rounded square with TL) -->
  <rect x="4" y="10" width="100" height="100" rx="20" ry="20" fill="url(#iconBg)"/>
  <!-- Glass shine -->
  <rect x="4" y="10" width="100" height="50" rx="20" ry="20" fill="rgba(255,255,255,0.08)"/>
  <!-- TL monogram -->
  <text x="54" y="72" font-family="Inter, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">TL</text>
  <!-- Accent dot -->
  <circle cx="88" cy="28" r="5" fill="#60a5fa" opacity="0.85"/>
  <circle cx="88" cy="28" r="2.2" fill="white" opacity="0.6"/>

  <!-- Brand text -->
  <text x="124" y="58" font-family="Inter, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="36" font-weight="800" fill="#111827" letter-spacing="-1">
    <tspan>Tech</tspan><tspan fill="#2563eb">Life</tspan>
  </text>
  <text x="124" y="88" font-family="Inter, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="600" fill="#6b7280" letter-spacing="3">INSIGHTS</text>
</svg>
