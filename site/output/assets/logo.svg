<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="8" y="8" width="184" height="184" rx="36" ry="36" fill="url(#bg)"/>
  <!-- Glass shine -->
  <rect x="8" y="8" width="184" height="92" rx="36" ry="36" fill="rgba(255,255,255,0.08)"/>
  <!-- TL monogram -->
  <text x="100" y="118" font-family="Inter, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="100" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-4">TL</text>
  <!-- Accent dot -->
  <circle cx="168" cy="48" r="10" fill="#60a5fa" opacity="0.85"/>
  <circle cx="168" cy="48" r="4.5" fill="white" opacity="0.6"/>
</svg>
